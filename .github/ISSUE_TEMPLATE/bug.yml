name: Bug report
description: Something is broken
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Before filing a bug: check that your AGL refresh token is still valid
        and that the integration has had at least 48 hours to collect data.

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      placeholder: "2025.6.0"
    validations:
      required: true

  - type: input
    id: haggle_version
    attributes:
      label: Haggle version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics file
      description: |
        Strongly recommended — it answers most triage questions in one go.
        Settings → Devices & Services → Haggle → ⋮ (three-dot menu) →
        **Download diagnostics**, then drag the downloaded `.json` file into
        this box. The file is anonymized: it contains no tokens and no
        account or contract numbers (identifiers are replaced by stable
        `anon-…` references). See
        [docs/diagnostics.md](https://github.com/NaanyaBiz/haggle/blob/main/docs/diagnostics.md)
        for exactly what's in it.
      placeholder: Drag and drop the diagnostics .json file here.
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Include relevant log lines (Settings → System → Logs, filter by "haggle").
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
