default_language_version:
  python: python3.13

repos:
  # Whitespace + EOL hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=1024"]
        exclude: ^uv\.lock$
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # Ruff: lint + format
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # mypy (strict)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: ^custom_components/haggle/
        additional_dependencies:
          - homeassistant
          - aiohttp
          - types-beautifulsoup4

  # Secret scanning
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # Conventional Commits
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: ["--strict"]

  # Local: every commit must carry a Co-Authored-By: Claude trailer.
  # The repo is purely AI-generated; provenance is mandatory.
  - repo: local
    hooks:
      - id: require-claude-coauthor
        name: Require Co-Authored-By Claude trailer
        language: script
        entry: scripts/check_claude_coauthor.sh
        stages: [commit-msg]
